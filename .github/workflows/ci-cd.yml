name: CI/CD — AI Document Assistant

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION_DEFAULT: "3.11"
  IMAGE_NAME: ai-doc-assistant

jobs:
  # ── 1. Lint & Static Analysis ──────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint dependencies
        working-directory: backend
        run: pip install ruff mypy

      - name: Ruff lint
        working-directory: backend
        run: ruff check app

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app

      - name: Mypy type check
        working-directory: backend
        run: mypy app --ignore-missing-imports

  # ── 2. Tests (matrix) ──────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Tests must pass before any downstream job runs
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend      # ← CRITICAL: run from backend/ so
        run: pip install -r requirements.txt   #   pyproject.toml config is found

      - name: Run pytest
        working-directory: backend      # ← CRITICAL: pytest reads pyproject.toml
        env:                            #   from the current directory
          OPENAI_API_KEY: sk-test-key
          LLM_PROVIDER: openai
          ENVIRONMENT: testing
        run: |
          pytest tests/ \
            -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=45

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == env.PYTHON_VERSION_DEFAULT
        with:
          name: coverage-xml
          path: backend/coverage.xml

  # ── 3. Docker Build & Push ─────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test          # ← won't run if any test matrix job fails
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy to Staging ───────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker          # ← won't run if docker build/push fails
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /opt/ai-doc-assistant
            git pull origin develop
            docker compose -f docker/docker-compose.yml pull
            docker compose -f docker/docker-compose.yml up -d --remove-orphans
            docker system prune -f

  # ── 5. Deploy to Production ────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker          # ← won't run if docker build/push fails
    if: github.ref == 'refs/heads/main'
    environment: production   # requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /opt/ai-doc-assistant
            git pull origin main
            docker compose -f docker/docker-compose.yml pull
            docker compose -f docker/docker-compose.yml up -d --remove-orphans
            docker system prune -f
