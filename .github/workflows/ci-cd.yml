name: CI/CD — AI Document Assistant

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend
  PYTHON_VERSION: "3.11"

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & Static Analysis
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy bandit

      - name: Ruff lint
        run: ruff check backend/app --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/app

      - name: Bandit security scan
        run: bandit -r backend/app -ll -x backend/app/tests

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Unit & Integration Tests
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        working-directory: backend
        env:
          OPENAI_API_KEY: sk-test-placeholder
          ENVIRONMENT: testing
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Docker Build & Push
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write
      id-token: write  # for OIDC signing

    outputs:
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push Backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Extract metadata — Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push Frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Security Scan
  # ────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'

    steps:
      - name: Run Trivy vulnerability scan — Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0  # Don't fail on vulnerabilities, just report

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5: Deploy to Staging
  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 300s
          script: |
            set -euo pipefail
            cd /opt/ai-doc-assistant

            echo "Pulling latest images..."
            docker compose -f docker/docker-compose.yml pull backend frontend

            echo "Rolling update..."
            docker compose -f docker/docker-compose.yml up -d --no-deps --force-recreate backend frontend

            echo "Waiting for health check..."
            sleep 15
            curl -sf http://localhost:8000/health/live || (docker compose logs backend && exit 1)

            echo "Cleaning up old images..."
            docker image prune -f

            echo "✅ Staging deploy complete"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 6: Deploy to Production
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.event_name == 'release'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production EC2 (Blue/Green)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 600s
          script: |
            set -euo pipefail
            cd /opt/ai-doc-assistant

            # Tag current as previous for rollback
            docker tag ai-doc-assistant/backend:latest ai-doc-assistant/backend:previous || true
            docker tag ai-doc-assistant/frontend:latest ai-doc-assistant/frontend:previous || true

            echo "Pulling release images: ${{ github.event.release.tag_name }}"
            IMAGE_TAG=${{ github.event.release.tag_name }} \
              docker compose -f docker/docker-compose.yml pull backend frontend

            echo "Zero-downtime rolling update..."
            # Scale up new instances before terminating old
            docker compose -f docker/docker-compose.yml up -d --no-deps --scale backend=2 backend
            sleep 20
            curl -sf http://localhost:8000/health/live || exit 1
            docker compose -f docker/docker-compose.yml up -d --no-deps --force-recreate frontend

            echo "Health verification..."
            for i in 1 2 3 4 5; do
              sleep 5
              curl -sf http://localhost:8000/health/ && break
              echo "Attempt $i failed..."
            done
            curl -sf http://localhost:8000/health/ || \
              (echo "ROLLBACK" && docker compose -f docker/docker-compose.yml up -d --force-recreate backend && exit 1)

            docker image prune -f
            echo "✅ Production deploy: ${{ github.event.release.tag_name }}"

      - name: Create deployment annotation in Grafana
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_TOKEN }}" \
            -d '{"text":"Deployed ${{ github.event.release.tag_name }}","tags":["deployment","production"]}' \
            "https://${{ secrets.PRODUCTION_DOMAIN }}/grafana/api/annotations" || true

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.26.0
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Production deploy *${{ github.event.release.tag_name }}* — ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
